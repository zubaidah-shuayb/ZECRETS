<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZECRETS | Access Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="void-bg-overlay"></div>

    <div class="gate-container">

        <header>
            <div class="void-z-logo">Z</div>
            <h1 class="brand-title">ZECRETS</h1>
        </header>

        <main class="vault-prompt">
            <p class="primary-prompt">Whispers from the Void.</p>
            <p class="secondary-prompt">
                Connect anonymously to continue.
            </p>
        </main>

        <a href="/auth/google" class="google-sign-in-btn">
            <img
                src="/assets/google.png"
                alt="Google Icon"
                class="google-icon-svg"
            >
    
        </a>

        <footer class="gate-footer">
            Authentication Required
        </footer>

    </div>

</body>
</html>
